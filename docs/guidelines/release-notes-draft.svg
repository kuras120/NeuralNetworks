  <line x1="160" y1="622" x2="800" y2="622" stroke="#d0d7de"/>
  <text x="160" y="666" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#24292f">Authors</text>
  <circle cx="174" cy="704" r="4" fill="#57606a"/>
  <text x="192" y="710" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#0969da">@octocat</text>
