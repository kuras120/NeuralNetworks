name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Leave empty to use the next patch version."
        required: false
        type: string

env:
  RELEASE_BRANCH: ${{ github.ref_name }}

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  prepare:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
      NEXT_DEV_VERSION: ${{ steps.version.outputs.NEXT_DEV_VERSION }}
      PREVIOUS_TAG: ${{ steps.version.outputs.PREVIOUS_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0

      - name: Determine release version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: python scripts/workflow/prepare_release.py --requested-version "$REQUESTED_VERSION"

  release_branch:
    needs: [test, prepare]
    runs-on: ubuntu-latest
    outputs:
      RELEASE_UPDATE_BRANCH: ${{ steps.release_branch.outputs.RELEASE_UPDATE_BRANCH }}
      RELEASE_COMMIT_SHA: ${{ steps.release_branch.outputs.RELEASE_COMMIT_SHA }}
    env:
      VERSION: ${{ needs.prepare.outputs.VERSION }}
      NEXT_DEV_VERSION: ${{ needs.prepare.outputs.NEXT_DEV_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0

      - name: Prepare release branch
        id: release_branch
        run: >
          python scripts/workflow/prepare_release_branch.py
          --version "${{ env.VERSION }}"
          --next-dev-version "${{ env.NEXT_DEV_VERSION }}"

  build:
    needs: [test, prepare, release_branch]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.VERSION }}
      RELEASE_COMMIT_SHA: ${{ needs.release_branch.outputs.RELEASE_COMMIT_SHA }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_COMMIT_SHA }}

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Build distribution
        run: python -m build

      - name: Build and verify runtime dependency lock
        run: scripts/workflow/build_dependency_lock.sh "${{ env.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: [test, prepare, release_branch, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.VERSION }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.PREVIOUS_TAG }}
      RELEASE_COMMIT_SHA: ${{ needs.release_branch.outputs.RELEASE_COMMIT_SHA }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_COMMIT_SHA }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: build/dist

      - name: Generate release notes
        run: >
          python scripts/workflow/generate_release_notes.py
          --version "${{ env.VERSION }}"
          --previous-tag "${{ env.PREVIOUS_TAG }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/dist/*.whl
            build/dist/*.tar.gz
            build/dist/*.lock
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: release-notes.md
          target_commitish: ${{ env.RELEASE_COMMIT_SHA }}

  version_update:
    needs: [prepare, release_branch, publish]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.VERSION }}
      NEXT_DEV_VERSION: ${{ needs.prepare.outputs.NEXT_DEV_VERSION }}
      RELEASE_UPDATE_BRANCH: ${{ needs.release_branch.outputs.RELEASE_UPDATE_BRANCH }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0

      - name: Create version update pull request
        run: >
          python scripts/workflow/create_version_update_pr.py
          --version "${{ env.VERSION }}"
          --next-dev-version "${{ env.NEXT_DEV_VERSION }}"
          --base "${{ env.RELEASE_BRANCH }}"
          --head "${{ env.RELEASE_UPDATE_BRANCH }}"
