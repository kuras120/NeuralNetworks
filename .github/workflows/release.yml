name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Leave empty to use the next patch version."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unittests
        run: coverage run -m unittest discover games_theory

      - name: Create coverage report
        run: coverage xml

      - name: Upload coverage report
        if: success()
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: bash <(curl -Ls https://coverage.codacy.com/get.sh) report -l Python -r coverage.xml

  prepare:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
      PREVIOUS_TAG: ${{ steps.version.outputs.PREVIOUS_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: python scripts/prepare_release.py --requested-version "${{ inputs.version }}"

  build:
    needs: [test, prepare]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Set package version for artifact
        run: python scripts/set_package_version.py "${{ env.VERSION }}"

      - name: Build distribution
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: [test, prepare, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.VERSION }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.PREVIOUS_TAG }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: build/dist

      - name: Generate release notes
        run: >
          python scripts/generate_release_notes.py
          --version "${{ env.VERSION }}"
          --previous-tag "${{ env.PREVIOUS_TAG }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/dist/*.whl
            build/dist/*.tar.gz
          tag_name: ${{ env.VERSION }}
          name: GamesTheory ${{ env.VERSION }}
          body_path: release-notes.md

  version_update:
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.VERSION }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set package version
        run: python scripts/set_package_version.py "${{ env.VERSION }}"

      - name: Create version update pull request
        run: python scripts/create_version_update_pr.py --version "${{ env.VERSION }}" --base master
